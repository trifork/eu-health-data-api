# ╭─────────────────────────Commonly Used ImplementationGuide Properties───────────────────────────╮
# │  The properties below are used to create the ImplementationGuide resource. The most commonly   │
# │  used properties are included. For a list of all supported properties and their functions,     │
# │  see: https://fshschool.org/docs/sushi/configuration/.                                         │
# ╰────────────────────────────────────────────────────────────────────────────────────────────────╯
id: hl7.fhir.eu.health-data-api
canonical: http://hl7.eu/fhir/health-data-api
name: EuHealthDataApi
title: EU Health Data API
description: >-
  This Implementation Guide defines FHIR-based APIs for accessing and exchanging
  health data in the European Health Data Space (EHDS). It composes existing IHE
  and HL7 specifications — MHD for document exchange, SMART Backend Services for
  authorization, PDQm for patient matching, and IPA for resource access — into a
  unified conformance target for EHR systems across Europe.
status: draft # draft | active | retired | unknown
version: 1.0.0-ballot
fhirVersion: 4.0.1 # https://www.hl7.org/fhir/valueset-FHIR-version.html
copyrightYear: 2025+
releaseLabel: ballot
# license: CC0-1.0 # https://www.hl7.org/fhir/valueset-spdx-license.html
# jurisdiction: urn:iso:std:iso:3166#US "United States of America" # https://www.hl7.org/fhir/valueset-jurisdiction.html
publisher:
  name: HL7 Europe
  url: http://hl7.eu
  # email: test@example.org
jurisdiction: http://unstats.un.org/unsd/methods/m49/m49.htm#150 "Europe"
copyright: >-
  Copyright HL7 Europe. Licensed under Creative Commons public domain (CC0 1.0).
license: CC0-1.0 # https://www.hl7.org/fhir/valueset-spdx-license.html


# The dependencies property corresponds to IG.dependsOn. The key is the
# package id and the value is the version (or dev/current). For advanced
# use cases, the value can be an object with keys for id, uri, and version.
#
dependencies:
  hl7.fhir.eu.base: 2.0.0-ballot
  ihe.iti.pdqm: 3.2.x
  ihe.iti.mhd: 4.2.x
  hl7.fhir.uv.ipa: 1.1.x
# Removed: ihe.pcc.qedm (zero uncommented FSH references; QEDm demoted to secondary behind IPA; only narrative mentions remain)
# Removed: hl7.fhir.eu.laboratory (zero FSH references; only markdown links to Lab IG as content profile)
# Removed: ihe.iti.pixm (Spencer S5 - not useful for this use case)
# Removed: hl7.fhir.uv.bulkdata (bulk data out of scope v1)
# Note: IUA is referenced conceptually but not as a package dependency
# Authorization uses SMART Backend Services with IUA actor groupings
#   hl7.fhir.us.core: 3.1.0
#   hl7.fhir.us.mcode:
#     id: mcode
#     uri: http://hl7.org/fhir/us/mcode/ImplementationGuide/hl7.fhir.us.mcode
#     version: 1.0.0
